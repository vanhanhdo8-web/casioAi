services:
  - type: web
    name: casio-tool
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      # Các biến môi trường khác KHÔNG chứa secret ở đây
      # Secret sẽ được thêm qua Dashboard
