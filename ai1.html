<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý Casio - Chatbot thông minh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 5px;
            margin-left: 10px;
            margin-right: 10px;
        }

        .typing-indicator {
            display: flex;
            padding: 12px 16px;
            background: white;
            border-radius: 15px;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        #user-input:focus {
            border-color: #667eea;
        }

        #send-button {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        #send-button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .link-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .link-card a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
        }

        .link-card button {
            background: #667eea;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .tool-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }

        .tool-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tool-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .ai-badge {
            background: #8a2be2;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 Trợ lý Casio <span class="ai-badge">AI</span></h2>
            <p>Hỏi tôi bất cứ điều gì!</p>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                <div class="message-content">
                    👋 Chào bạn! Tôi là trợ lý AI của Casio Tool Server.
                    <br><br>
                    <b>Các trang có sẵn:</b><br>
                    🔹 <a href="/asm" target="_blank">/asm</a> - Compiler ASM<br>
                    🔹 <a href="/hex" target="_blank">/hex</a> - Hex Editor<br>
                    🔹 <a href="/pixel" target="_blank">/pixel</a> - Pixel Tools<br>
                    🔹 <a href="/spell" target="_blank">/spell</a> - Spell Check<br>
                    🔹 <a href="/rop" target="_blank">/rop</a> - ROP Tools<br>
                    <br>
                    Bạn cần tôi giúp gì?
                </div>
                <div class="message-time">Vừa xong</div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Nhập câu hỏi..." onkeypress="handleKeyPress(event)">
            <button id="send-button" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');

        // Danh sách trang
        const pages = {
            'asm': { name: 'Compiler ASM', url: '/asm', icon: '⚙️' },
            'hex': { name: 'Hex Editor', url: '/hex', icon: '🔢' },
            'pixel': { name: 'Pixel Tools', url: '/pixel', icon: '🎨' },
            'spell': { name: 'Spell Check', url: '/spell', icon: '📝' },
            'rop': { name: 'ROP Tools', url: '/rop', icon: '🔧' },
            'donate': { name: 'Donate', url: '/donate', icon: '💰' },
            'lienhe': { name: 'Liên hệ', url: '/lienhe', icon: '📞' }
        };

        function formatTime() {
            const now = new Date();
            return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        }

        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content;
            
            messageDiv.appendChild(contentDiv);
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = formatTime();
            messageDiv.appendChild(timeDiv);
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message bot';
            indicator.id = 'typing-indicator';
            
            const content = document.createElement('div');
            content.className = 'typing-indicator';
            content.innerHTML = '<span></span><span></span><span></span>';
            
            indicator.appendChild(content);
            chatMessages.appendChild(indicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function createLinkCard(pageKey) {
            const page = pages[pageKey];
            return `
                <div class="link-card">
                    <div>
                        <div style="font-size: 1.2rem;">
                            ${page.icon} <a href="${page.url}" target="_blank">${page.name}</a>
                        </div>
                        <div style="font-size: 0.85rem; color: #666;">${page.url}</div>
                    </div>
                    <button onclick="window.open('${page.url}', '_blank')">Mở</button>
                </div>
            `;
        }

        function findPageFromMessage(message) {
            message = message.toLowerCase();
            for (const [key, page] of Object.entries(pages)) {
                if (message.includes(key) || message.includes(page.name.toLowerCase())) {
                    return key;
                }
            }
            if (message.includes('compiler')) return 'asm';
            if (message.includes('hex')) return 'hex';
            if (message.includes('pixel')) return 'pixel';
            if (message.includes('spell')) return 'spell';
            if (message.includes('rop')) return 'rop';
            if (message.includes('donate')) return 'donate';
            if (message.includes('liên hệ')) return 'lienhe';
            return null;
        }

        async function callGeminiAI(prompt) {
            try {
                // Dùng Gemini API thật
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=YOUR_API_KEY', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error('Gemini error:', error);
                // Fallback nếu không có API key
                return getFallbackResponse(prompt);
            }
        }

        function getFallbackResponse(message) {
            // Fallback thông minh khi không có Gemini
            const responses = {
                'bạn là ai': 'Tôi là trợ lý AI của Casio Tool Server!',
                'làm thế nào': 'Bạn có thể dùng các lệnh: "mở asm", "vào hex", "spell check"...',
                'cảm ơn': 'Không có gì! Luôn sẵn sàng giúp bạn.',
                'tạm biệt': 'Tạm biệt! Hẹn gặp lại.'
            };
            
            for (const [key, value] of Object.entries(responses)) {
                if (message.toLowerCase().includes(key)) {
                    return value;
            }
        }
            return `Tôi hiểu bạn muốn hỏi về "${message}". Bạn có thể vào các trang: /asm, /hex, /spell, /rop. Hoặc gõ "trợ giúp" để xem hướng dẫn.`;
        }

        async function processMessage(message) {
            // Kiểm tra nếu là yêu cầu mở trang
            const pageKey = findPageFromMessage(message);
            if (pageKey) {
                return createLinkCard(pageKey);
            }

            // Nếu là câu hỏi thông thường, dùng AI
            const prompt = `Bạn là trợ lý của Casio Tool Server. 
                          Các trang có sẵn: ${Object.keys(pages).join(', ')}.
                          Câu hỏi: ${message}
                          Hãy trả lời thân thiện bằng tiếng Việt.`;
            
            const aiResponse = await callGeminiAI(prompt);
            return aiResponse;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            userInput.value = '';
            
            showTypingIndicator();
            
            try {
                const response = await processMessage(message);
                removeTypingIndicator();
                addMessage(response);
            } catch (error) {
                removeTypingIndicator();
                addMessage(`❌ Lỗi: ${error.message}`);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Focus vào input
        userInput.focus();
    </script>
</body>
</html>
